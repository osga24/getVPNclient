services:
  web:
    build: .
    volumes:
      - ./wg-clients:/app/wg-clients:ro
    restart: unless-stopped
  nginx:
    image: nginx:stable-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
