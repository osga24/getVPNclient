<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPN 下載平台</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0d0d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e5e5e5;
      }

      .card {
        width: 100%;
        max-width: 360px;
        padding: 2.5rem 2rem;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 2rem;
      }

      .logo svg {
        color: #a78bfa;
        flex-shrink: 0;
      }

      .logo-text {
        font-size: 0.9375rem;
        font-weight: 600;
        color: #e5e5e5;
        letter-spacing: -0.01em;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.02em;
        margin-bottom: 0.35rem;
      }

      .subtitle {
        font-size: 0.875rem;
        color: #6b6b6b;
        margin-bottom: 2rem;
      }

      .field {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        color: #a0a0a0;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 0.45rem;
      }

      .input-wrap {
        position: relative;
      }

      .input-wrap svg {
        position: absolute;
        left: 0.85rem;
        top: 50%;
        transform: translateY(-50%);
        color: #4b4b4b;
        pointer-events: none;
      }

      input {
        width: 100%;
        padding: 0.65rem 0.85rem 0.65rem 2.5rem;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        font-size: 0.9375rem;
        color: #e5e5e5;
        outline: none;
        transition: border-color 0.15s;
      }

      input::placeholder {
        color: #3d3d3d;
      }

      input:focus {
        border-color: #7c3aed;
        background: #1d1a24;
      }

      .error {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: #1c1010;
        border: 1px solid #3d1515;
        color: #f87171;
        border-radius: 8px;
        padding: 0.65rem 0.85rem;
        font-size: 0.8125rem;
        margin-bottom: 1.2rem;
      }

      .hint {
        font-size: 0.75rem;
        color: #4b4b4b;
        margin-top: 0.4rem;
        padding-left: 0.1rem;
      }

      button {
        width: 100%;
        margin-top: 0.5rem;
        padding: 0.72rem;
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.15s,
          opacity 0.15s;
        letter-spacing: -0.01em;
      }

      button:hover {
        background: #6d28d9;
      }
      button:active {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
        <span class="logo-text">VPN 下載平台</span>
      </div>

      <h1>登入</h1>
      <p class="subtitle">使用您的學號與末四碼密碼登入</p>

      {% if error %}
      <div class="error">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="field">
          <label for="student_id">學號</label>
          <div class="input-wrap">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input
              type="text"
              id="student_id"
              name="student_id"
              placeholder="B11001234"
              required
              autocomplete="username"
            />
          </div>
        </div>

        <div class="field">
          <label for="password">密碼</label>
          <div class="input-wrap">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="學號末四碼"
              required
              autocomplete="current-password"
            />
          </div>
          <p class="hint">例如學號 B11001234，密碼為 1234</p>
        </div>

        <button type="submit">登入</button>
      </form>
    </div>
  </body>
</html>
